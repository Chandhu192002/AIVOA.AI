# Optional: Postgres for the assignment's MySQL/Postgres requirement.
#   docker compose up -d
# then set in backend/.env:
#   DATABASE_URL=postgresql+psycopg2://crm:crm@localhost:5432/hcp_crm
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: hcp_crm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d hcp_crm"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
